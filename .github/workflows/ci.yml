name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: manual
          queries: security-and-quality

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Verify formatting
        run: dotnet format CheckMate2.slnx --verify-no-changes --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

      - name: Perform CodeQL Analysis
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Initialize CodeQL
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-and-quality

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npx vite build

      - name: Lint
        run: npx eslint .

      - name: Perform CodeQL Analysis
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Restore backend dependencies
        run: dotnet restore
        working-directory: .
      - name: Build backend
        run: dotnet build --no-restore
        working-directory: .
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Build frontend
        run: VITE_API_BASE_URL=http://localhost:5269 npm run build
      - name: Run Playwright tests
        env:
          VITE_API_BASE_URL: http://localhost:5269
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  deploy-backend:
    name: Deploy Backend (ASP.NET Core)
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e-tests]
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/CheckMate2.Api/CheckMate2.Api.csproj

      - name: Build
        run: dotnet build backend/CheckMate2.Api/CheckMate2.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish backend/CheckMate2.Api/CheckMate2.Api.csproj --configuration Release --no-build --output ./backend/publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set connection string
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          app-settings-json: |
            [
              { "name": "ConnectionStrings__CheckMate2", "value": "${{ secrets.AZURE_SQL_CONNECTION_STRING }}", "slotSetting": false }
            ]

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          package: ./backend/publish

  deploy-frontend:
    name: Deploy Frontend (React)
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.AZURE_BACKEND_URL }}

      - name: Deploy to Azure Static Web Apps
        run: npm run deploy -- --env production --deployment-token ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        working-directory: frontend
